<!doctype html>
<html lang="en" dir="ltr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://aocnsmmsddvnmrbnneds.supabase.co" crossorigin />
		<link rel="preload" href="/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin />
		<link rel="preload" href="/fonts/inter-latin-ext.woff2" as="font" type="font/woff2" crossorigin />
		<link rel="preload" href="/fonts/outfit-400.woff2" as="font" type="font/woff2" crossorigin />
		<link rel="preload" href="/fonts/outfit-400-ext.woff2" as="font" type="font/woff2" crossorigin />
		<link rel="alternate" type="application/rss+xml" title="RSS Feed" href="/rss.xml" />
		<script>
			(() => {
				try {
					const stored = localStorage.getItem('theme');
					const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
					document.documentElement.dataset.theme = stored || (prefersLight ? 'light' : 'dark');
				} catch {
					document.documentElement.dataset.theme = 'dark';
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
