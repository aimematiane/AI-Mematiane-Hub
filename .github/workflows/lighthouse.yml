name: Lighthouse CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Run LHCI autorun
        run: npx lhci autorun --upload.target=temporary-public-storage

  accessibility:
    runs-on: ubuntu-latest
    needs: lighthouse
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Start preview server
        run: npm run preview -- --port=8080 & npx wait-on http://localhost:8080
      - name: Run pa11y
        run: npx pa11y http://localhost:8080 --reporter html > reports/pa11y.html || true
      - name: Upload pa11y report
        uses: actions/upload-artifact@v4
        with:
          name: pa11y-report
          path: reports/pa11y.html
